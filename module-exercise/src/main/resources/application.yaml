server:
  port: ${SERVICE_PORT:8082}

spring:
  application:
    name: exercise-service
  datasource:
    url: "${DB_URL:jdbc:postgresql://localhost:5432/memowave_db}"
    username: "${DB_USERNAME:pgadmin}"
    password: "${DB_PASSWORD:pgadmin}"
    driverClassName: org.postgresql.Driver
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always

security:
  token:
    signing:
      key: "${TOKEN_SECRET_KEY:53A73E5F1C4E0A2D3B5F2D784E6A1B423D6F247D1F6E5C3A596D635A75327855}"

springdoc:
  api-docs:
    path: /exercise-service/v3/api-docs