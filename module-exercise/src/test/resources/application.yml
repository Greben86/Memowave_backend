server:
  port: 8082
spring:
  cloud:
    config:
      enabled: false
  application:
    name: exercise-service
  datasource:
    url: jdbc:h2:mem:memowave_db
    username: sa
    password:
    driverClassName: org.h2.Driver
  h2:
    console:
      enabled: false
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true

