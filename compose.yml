version: '3.9'

services:
  postgres:
    container_name: memowave_postgres_container
    image: postgres:17.0-alpine3.20
    environment:
      POSTGRES_DB: "memowave_db"
      POSTGRES_USER: "pgadmin"
      POSTGRES_PASSWORD: "pgadmin"
      PGDATA: "/var/lib/postgresql/data/pgdata"
    volumes:
      - database-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U admin -d database" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
    networks:
      - memowave-network

  liquibase:
    container_name: memowave_liquibase_container
    image: liquibase/liquibase:4.32.0
    environment:
      LIQUIBASE_COMMAND_URL: "jdbc:postgresql://postgres:5432/memowave_db"
      LIQUIBASE_COMMAND_DRIVER: "org.postgresql.Driver"
      LIQUIBASE_COMMAND_USERNAME: "pgadmin"
      LIQUIBASE_COMMAND_PASSWORD: "pgadmin"
      LIQUIBASE_COMMAND_CHANGELOG_FILE: changelog.yml # Path within the container
      LIQUIBASE_SEARCH_PATH: /liquibase/changelog
    command: update # Command to execute (e.g., update, rollback)
    volumes:
      - ./liquibase/changelog:/liquibase/changelog
    networks:
      - memowave-network
    depends_on:
      postgres:
        condition: service_healthy # Ensure DB is ready before Liquibase runs

#  pgadmin:
#    container_name: memowave_pgadmin_container
#    image: dpage/pgadmin4:latest
#    environment:
#      PGADMIN_DEFAULT_EMAIL: "admin@mail.me"
#      PGADMIN_DEFAULT_PASSWORD: "admin"
#      PGADMIN_CONFIG_SERVER_MODE: "False"
#    healthcheck:
#      test: [ "CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:80/misc/ping || exit -1" ]
#      interval: 10s
#      timeout: 5s
#      start_period: 10s
#      retries: 5
#    volumes:
#      - pgadmin-data:/var/lib/pgadmin
#    ports:
#      - "5050:80"
#    restart: unless-stopped
#    networks:
#      - memowave-network
#    depends_on:
#      postgres:
#        condition: service_healthy # Ensure DB is ready before Liquibase runs

  minio:
    image: minio/minio
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://minio:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - memowave-network

  rabbitmq:
    # Use the official image with the management plugin enabled
    image: rabbitmq:3-management
    container_name: rabbitmq
    restart: always
    ports:
      # AMQP protocol port (for your applications to connect)
      - "5672:5672"
      # HTTP management UI port (access via http://localhost:15672)
#      - "15672:15672"
    environment:
      # Optional: set custom default user and password (default is guest/guest)
      RABBITMQ_DEFAULT_USER: rbuser
      RABBITMQ_DEFAULT_PASS: rbuser
    volumes:
      # Optional: Persist data to a local volume to prevent data loss on container restart
      - rabbitmq_data:/var/lib/rabbitmq/mnesia/
    networks:
      - memowave-network

  userservice:
    container_name: user-management-service
    build:
      dockerfile_inline: |
        # Родительский образ контейнера с java внутри
        FROM eclipse-temurin:21-jre-alpine
        RUN apk add --no-cache curl
        RUN mkdir /app
        WORKDIR /app
        # Копирование jar-файла в контейнер
        COPY module-user-management/build/libs/*-0.0.1-SNAPSHOT.jar /app.jar
        # Открытие порта 8081
        EXPOSE 8081
        USER 1000:1000
        # Команда, которая будет запущена при старте контейнера java -jar ./app.jar
        ENTRYPOINT ["java", "-jar", "/app.jar"]
    environment:
      SERVICE_PORT: 8081
      DB_URL: jdbc:postgresql://postgres:5432/memowave_db
      DB_USERNAME: pgadmin
      DB_PASSWORD: pgadmin
    ports:
      - "8081:8081"
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://user-management-service:8081/actuator/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - memowave-network
    depends_on:
      postgres:
        condition: service_healthy

  importexportservice:
    container_name: import-export-service
    build:
      dockerfile_inline: |
        # Родительский образ контейнера с java внутри
        FROM eclipse-temurin:21-jre-alpine
        RUN apk add --no-cache curl
        RUN mkdir /app
        WORKDIR /app
        # Копирование jar-файла в контейнер
        COPY module-import-export/build/libs/*-0.0.1-SNAPSHOT.jar /app.jar
        # Открытие порта 8083
        EXPOSE 8083
        USER 1000:1000
        # Команда, которая будет запущена при старте контейнера java -jar ./app.jar
        ENTRYPOINT ["java", "-jar", "/app.jar"]
    environment:
      SERVICE_PORT: 8083
      MINIO_ENDPOINT: "http://minio:9000"
      MINIO_ACCESS_KEY: "minioadmin"
      MINIO_SECRET_KEY: "minioadmin"
      MINIO_BUCKET: "output-files"
      RABBIT_HOST: "rabbitmq"
      RABBIT_PORT: "5672"
      RABBIT_USERNAME: "rbuser"
      RABBIT_PASSWORD: "rbuser"
      RABBIT_INPUT_QUEUE: "message_queue_process"
      RABBIT_OUTPUT_QUEUE: "message_queue_upload"
    ports:
      - "8083:8083"
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://import-export-service:8083/actuator/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - memowave-network
    depends_on:
      minio:
        condition: service_healthy
      rabbitmq:
        condition: service_started

  exerciseservice:
    container_name: exercise-service
    build:
      dockerfile_inline: |
        # Родительский образ контейнера с java внутри
        FROM eclipse-temurin:21-jre-alpine
        RUN apk add --no-cache curl
        RUN mkdir /app
        WORKDIR /app
        # Копирование jar-файла в контейнер
        COPY module-exercise/build/libs/*-0.0.1-SNAPSHOT.jar /app.jar
        # Открытие порта 8082
        EXPOSE 8082
        USER 1000:1000
        # Команда, которая будет запущена при старте контейнера java -jar ./app.jar
        ENTRYPOINT ["java", "-jar", "/app.jar"]
    environment:
      SERVICE_PORT: 8082
      DB_URL: jdbc:postgresql://postgres:5432/memowave_db
      DB_USERNAME: pgadmin
      DB_PASSWORD: pgadmin
      MINIO_ENDPOINT: "http://minio:9000"
      MINIO_ACCESS_KEY: "minioadmin"
      MINIO_SECRET_KEY: "minioadmin"
      MINIO_BUCKET: "output-files"
      RABBIT_HOST: "rabbitmq"
      RABBIT_PORT: "5672"
      RABBIT_USERNAME: "rbuser"
      RABBIT_PASSWORD: "rbuser"
      RABBIT_INPUT_QUEUE: "message_queue_upload"
      RABBIT_OUTPUT_QUEUE: "message_queue_process"
    ports:
      - "8082:8082"
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://exercise-service:8082/actuator/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - memowave-network
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      rabbitmq:
        condition: service_started

  gateway:
    container_name: gateway-service
    build:
      dockerfile_inline: |
        # Родительский образ контейнера с java внутри
        FROM eclipse-temurin:21-jre-alpine
        RUN apk add --no-cache curl
        RUN mkdir /app
        WORKDIR /app
        # Копирование jar-файла в контейнер
        COPY module-gateway/build/libs/*-0.0.1-SNAPSHOT.jar /app.jar
        # Открытие порта 8080
        EXPOSE 8080
        USER 1000:1000
        # Команда, которая будет запущена при старте контейнера java -jar ./app.jar
        ENTRYPOINT ["java", "-jar", "/app.jar"]
    depends_on:
      userservice:
        condition: service_healthy
      exerciseservice:
        condition: service_healthy
    environment:
      SERVICE_PORT: 8080
      USER_MANAGEMENT_URL: "http://user-management-service:8081"
      EXERCISE_URL: "http://exercise-service:8082"
      IMPORT_EXPORT_URL: "http://import-export-service:8083"
    ports:
      - "8080:8080"
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://gateway-service:8080/actuator/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - memowave-network

volumes:
  database-data:
  pgadmin-data:
  minio_data:
  rabbitmq_data:

networks:
  memowave-network:
    driver: bridge
