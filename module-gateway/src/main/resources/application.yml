server:
  port: ${SERVICE_PORT:8080}
spring:
  application:
    name: module-gateway
  cloud:
    config:
      import-check:
        enabled: false
    gateway:
      server:
        webflux:
          routes:
            - id: user-management-service
              uri: ${USER_MANAGEMENT_URL}
              predicates:
                - Path=/user-management-service/**,/api/users/**,/api/auth/*
    discovery:
      locator:
        enabled: true
        lower-case-service-id: true

management:
  endpoints:
    web:
      exposure:
        include: "*"

springdoc:
  swagger-ui:
    urls:
      - name: user-management-service
        url: /user-management-service/v3/api-docs