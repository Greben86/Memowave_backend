spring:
  rabbitmq:
    host: ${RABBIT_HOST}
    port: ${RABBIT_PORT}
    username: ${RABBIT_USERNAME}
    password: ${RABBIT_PASSWORD}

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    fetchRegistry: true
    service-url:
      defaultZone: http://discovery-service:8080/eureka
    healthcheck:
      enabled: true
  instance:
    # Не использовать IP, а использовать hostname
    preferIpAddress: false
    hostname: import-export-service
    non-secure-port: ${server.port}
    instance-enabled-on-itself: true
    metadata-map:
      management.context-path: /

springdoc:
  api-docs:
    path: /import-export-service/v3/api-docs

minio:
  endpoint: ${MINIO_ENDPOINT}
  accessKey: ${MINIO_ACCESS_KEY}
  secretKey: ${MINIO_SECRET_KEY}
  bucket-name: ${MINIO_BUCKET}

rabbitmq:
  queue:
    input: ${RABBIT_INPUT_QUEUE}
    output: ${RABBIT_OUTPUT_QUEUE}