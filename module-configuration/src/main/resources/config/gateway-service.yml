spring:
  cloud:
    config:
      import-check:
        enabled: false
    gateway:
      server:
        webflux:
          routes:
            - id: user-management-service
              uri: lb://user-management-service
              predicates:
                - Path=/user-management-service/**,/api/users/**,/api/auth/*
            - id: exercise-service
              uri: lb://exercise-service
              predicates:
                - Path=/exercise-service/**,/api/words/**,/api/categories/**
    discovery:
      locator:
        enabled: true
        lower-case-service-id: true

eureka:
  client:
    register-with-eureka: false
    fetch-registry: true
    fetchRegistry: true
    service-url:
      defaultZone: http://discovery-service:8080/eureka
    healthcheck:
      enabled: true
  instance:
    preferIpAddress: true
    metadataMap:
      management.context-path: /

springdoc:
  swagger-ui:
    urls:
      - name: user-management-service
        url: /user-management-service/v3/api-docs
      - name: exercise-service
        url: /exercise-service/v3/api-docs