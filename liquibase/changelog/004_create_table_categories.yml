databaseChangeLog:
  - preConditions:
      onFail: HALT
      onError: HALT

  - changeSet:
      id: 004_1
      labels: Create categories table
      author: Viktor
      changes:
        - createTable:
            tableName: categories
            columns:
              - column:
                  name: id
                  type: BIGINT
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: pack_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_categories_packs
                    references: packs(id)
              - column:
                  name: name
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: color
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
      rollback:
        - dropTable:
            tableName: categories

  - changeSet:
      id: 004_2
      labels: Create sequence for categories primary key
      author: Viktor
      changes:
        - createSequence:
            sequenceName: categories_seq
            startValue: 1
            incrementBy: 1
            minValue: 1
            maxValue: 999999999999999999
            cycle: false
            dataType: BIGINT
      rollback:
        - dropSequence:
            sequenceName: categories_seq